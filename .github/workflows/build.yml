name: Build and Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

env:
  BINARY_NAME: deepseek
  VERSION: "1.0.0"

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            arch: 386
            runner: ubuntu-latest
            goos: linux
            goarch: 386
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: linux
            arch: arm
            runner: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: 7
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            goos: linux
            goarch: arm64
          
          # Windows
          - os: windows
            arch: 386
            runner: ubuntu-latest
            goos: windows
            goarch: 386
            ext: .exe
          - os: windows
            arch: amd64
            runner: ubuntu-latest
            goos: windows
            goarch: amd64
            ext: .exe
          - os: windows
            arch: arm64
            runner: ubuntu-latest
            goos: windows
            goarch: arm64
            ext: .exe
          
          # macOS
          - os: darwin
            arch: amd64
            runner: macos-latest
            goos: darwin
            goarch: amd64
          - os: darwin
            arch: arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
          
          # FreeBSD (cross-compile from Linux)
          - os: freebsd
            arch: 386
            runner: ubuntu-latest
            goos: freebsd
            goarch: 386
          - os: freebsd
            arch: amd64
            runner: ubuntu-latest
            goos: freebsd
            goarch: amd64
          - os: freebsd
            arch: arm
            runner: ubuntu-latest
            goos: freebsd
            goarch: arm
            goarm: 7
          - os: freebsd
            arch: arm64
            runner: ubuntu-latest
            goos: freebsd
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          OUTPUT_NAME="${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          LDFLAGS="-s -w -X main.version=${{ env.VERSION }}"
          go build -ldflags="$LDFLAGS" -o "$OUTPUT_NAME" .
          
          # Create output directory
          mkdir -p build
          mv "$OUTPUT_NAME" build/

      - name: Create archive
        shell: bash
        run: |
          cd build
          FILENAME="${{ env.BINARY_NAME }}-${{ env.VERSION }}-${{ matrix.os }}-${{ matrix.arch }}"
          
          if [[ "${{ matrix.os }}" == "windows" ]]; then
            zip "${FILENAME}.zip" "${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.ext }}"
          else
            tar -czf "${FILENAME}.tar.gz" "${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.os }}-${{ matrix.arch }}
          path: build/*.{tar.gz,zip}
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          find . -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec sha256sum {} \; > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/SHA256SUMS.txt
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Run tests
        run: go test -v ./...

      - name: Build test
        run: go build -v .

      - name: Verify binary
        run: |
          ./deepseek --help
          ./deepseek chat --help
          ./deepseek fim --help
          ./deepseek models --help
          ./deepseek balance --help
